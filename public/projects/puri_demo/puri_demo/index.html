<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
	<title></title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<meta property="og:title" content="">
	<meta property="og:description" content="">
	<meta name="mobile-web-app-capable" content="yes" />
	<meta property="og:image" content="preview.jpg">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style type="text/css" title="Default">
		/* fullscreen */
		html {
			height: 100%;
		}

		body {
			height: 100%;
			margin: 0px;
			background: black;
			color: white;
			overflow: hidden;
			/* disable scrollbars */
			-webkit-tap-highlight-color: rgba(0, 0, 0, 0);
			/* remove highlight on tab for iOS/Android */
		}

		/* fix for scroll bars on webkit & >=Mac OS X Lion */
		::-webkit-scrollbar {
			background-color: rgba(0, 0, 0, 0.5);
			width: 0.75em;
			height: 0.75em;
		}

		::-webkit-scrollbar-thumb {
			background-color: rgba(255, 255, 255, 0.5);
		}
	</style>
</head>

<body>
	<!-- - - - - - - 8<- - - - - - cut here - - - - - 8<- - - - - - - -->
	<script type="text/javascript" src="pano2vr_player.js?ts=15665724">
	</script>
	<script type="text/javascript" src="skin.js?ts=15665724">
	</script>
	<script src="https://www.youtube.com/iframe_api"></script>
	<script src="https://player.vimeo.com/api/player.js"></script>
	<script src="3rdparty/lottie/lottie.min.js"></script>
	<div id="custom-map-overlay" style="display: none; position: absolute; top: 12%; left: 12%; width: 76%; height: 76%; z-index: 1000; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); overflow: hidden; border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);">
		<div style="position: absolute; top: 12px; left: 20px; z-index: 1001; font-family: sans-serif; font-size: 16px; font-weight: bold; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Location Map</div>
		<button onclick="closeCustomMap()" style="position: absolute; top: 12px; right: 12px; z-index: 1001; background: rgba(255,255,255,0.25); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); transition: background 0.2s;" onmouseover="this.style.background='rgba(255,0,0,0.8)'" onmouseout="this.style.background='rgba(255,255,255,0.25)'">✕</button>
		<div id="custom-map-div" style="width: 100%; height: 100%;"></div>
	</div>
	<div id="container" style="width:100%;height:100%;overflow:hidden;">
		<br>Loading...<br><br>
	</div>
	<script type="text/javascript">
		function parseParams(paramsString, params) {
			paramsString = paramsString.substring(1);
			var firstSeparatorPos = paramsString.indexOf(",");
			if (firstSeparatorPos != -1) {
				params.startNode = paramsString.slice(0, firstSeparatorPos);
				var viewingParamsString = paramsString.slice(firstSeparatorPos + 1);
				var viewingParams = viewingParamsString.split(",");
				if (viewingParams.length >= 3) {
					var startView = {};
					startView["pan"] = viewingParams[0];
					startView["tilt"] = viewingParams[1];
					startView["fov"] = viewingParams[2];
					if (viewingParams.length >= 4) {
						startView["projection"] = viewingParams[3];
					}
					params.startView = startView;
				}
			} else {
				params.startNode = paramsString;
				params.startView = "";
			}
		}
		var params = {};
		parseParams(document.location.hash, params);
		var startNode = params.startNode;
		var startView = params.startView;
		if (("onhashchange" in window) && (!(/MSIE (\d+\.\d+);/.test(navigator.userAgent)))) {
			window.onhashchange = function () {
				parseParams(window.location.hash, params);
				pano.openNext('{' + params.startNode + '}', params.startView);
			}
		} else {
			var lastHash = window.location.hash;
			window.setInterval(function () {
				if (window.location.hash != lastHash) {
					lastHash = window.location.hash;
					parseParams(window.location.hash, params);
					pano.openNext('{' + params.startNode + '}', params.startView);
				}
			}, 100);
		}
		// create the panorama player with the container
		pano = new pano2vrPlayer("container");
		pano.startNode = startNode;
		pano.startView = startView;
		pano.setQueryParameter("ts=15665724")
		// add the skin object
		skin = new pano2vrSkin(pano);
		// Listen for node changes and notify parent window
		pano.addListener('changenode', function () {
			var nodeId = pano.getCurrentNode();
			if (window.parent) {
				window.parent.postMessage({
					type: 'changenode',
					nodeId: nodeId
				}, '*');
			}
		});

		var targetServiceSpot = null;
		var customMap = null;
		var currentUserMarker = null;
		var targetServiceMarker = null;
		var customMapOpen = false;

		// Listen for targetServiceSpot and node updates from the parent window
		window.addEventListener('message', function (event) {
			if (event.data && event.data.type === 'setTargetNode') {
				targetServiceSpot = event.data.targetServiceSpot || null;
				if (customMapOpen) {
					updateCustomMap();
				}
			}
		});

		// Listen for configuration load to enable the native map button and hijack its click event
		pano.addListener('configloaded', function () {
			// Enable native map button option variable inside the panorama player screen
			pano.setVariableValue('opt_maps', true);

			// Intercept standard Map button container
			if (skin._btn_map_icon_container) {
				skin._btn_map_icon_container.onclick = function (e) {
					if (e) {
						e.stopPropagation();
						e.preventDefault();
					}
					openCustomMap();
				};
			}

			// Intercept phone Map button container
			if (skin._btn_map_icon_container_phone) {
				skin._btn_map_icon_container_phone.onclick = function (e) {
					if (e) {
						e.stopPropagation();
						e.preventDefault();
					}
					openCustomMap();
				};
			}
		});

		function openCustomMap() {
			var overlay = document.getElementById('custom-map-overlay');
			if (!overlay) return;
			overlay.style.display = 'block';
			customMapOpen = true;

			// Initialize Leaflet map if it doesn't exist yet
			if (!customMap) {
				customMap = L.map('custom-map-div').setView([19.784463, 85.788882], 15);
				L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
					attribution: '&copy; OpenStreetMap contributors'
				}).addTo(customMap);
			}

			updateCustomMap();
		}

		function closeCustomMap() {
			var overlay = document.getElementById('custom-map-overlay');
			if (overlay) {
				overlay.style.display = 'none';
			}
			customMapOpen = false;
		}

		function updateCustomMap() {
			if (!customMap) return;

			// Clear existing markers
			if (currentUserMarker) {
				customMap.removeLayer(currentUserMarker);
				currentUserMarker = null;
			}
			if (targetServiceMarker) {
				customMap.removeLayer(targetServiceMarker);
				targetServiceMarker = null;
			}

			var coords = pano.getNodeLatLng(pano.getCurrentNode());
			var markers = [];

			if (coords && coords.length >= 2) {
				// Current User Node Marker (Blue marker)
				currentUserMarker = L.marker([coords[0], coords[1]], {
					icon: L.icon({
						iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
						shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
						iconSize: [25, 41],
						iconAnchor: [12, 41],
						popupAnchor: [1, -34],
						shadowSize: [41, 41]
					})
				}).addTo(customMap).bindPopup("<b>You are here</b>").openPopup();
				markers.push([coords[0], coords[1]]);
			}

			if (targetServiceSpot && targetServiceSpot.latitude && targetServiceSpot.longitude) {
				// Target Service Marker (Red marker)
				targetServiceMarker = L.marker([targetServiceSpot.latitude, targetServiceSpot.longitude], {
					icon: L.icon({
						iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
						shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
						iconSize: [25, 41],
						iconAnchor: [12, 41],
						popupAnchor: [1, -34],
						shadowSize: [41, 41]
					})
				}).addTo(customMap).bindPopup("<b>Target: " + targetServiceSpot.name + "</b>");
				markers.push([targetServiceSpot.latitude, targetServiceSpot.longitude]);
			}

			// Adjust map view to fit all markers
			if (markers.length > 0) {
				setTimeout(function() {
					customMap.invalidateSize();
					var bounds = L.latLngBounds(markers);
					customMap.fitBounds(bounds, { padding: [50, 50] });
				}, 100);
			}
		}


		// load the configuration
		window.addEventListener("load", function () {
			pano.readConfigUrlAsync("pano.xml?ts=15665724");
		});
		if (window.navigator.userAgent.match(/Safari/i)) {
			// fix for white borders, rotation on iPhone
			function iosHfix(e) {
				window.scrollTo(0, 1);
				var container = document.getElementById("container");
				var oh = container.offsetHeight;
				document.documentElement.style.setProperty('height', '100vh');
				if (oh != container.offsetHeight) {
					container.style.setProperty('height', "100%");
				} else {
					container.style.setProperty('height', window.innerHeight + "px");
				}
				window.scrollTo(0, 0);
				pano.setViewerSize(container.offsetWidth, container.offsetHeight);
			};
			setTimeout(iosHfix, 0);
			setTimeout(iosHfix, 100);
			window.addEventListener("resize", function () {
				setTimeout(iosHfix, 0);
				// hide toolbar on iPad happens with a delay
				setTimeout(iosHfix, 500);
				setTimeout(iosHfix, 1000);
				setTimeout(iosHfix, 2000);
			});
		}
	</script>
	<noscript>
		<p><b>Please enable Javascript!</b></p>
	</noscript>
